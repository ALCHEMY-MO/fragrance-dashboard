<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragrance Materials Market Dashboard</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;
    --text: #1a1a1a;
    --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.12);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-secondary: #2a2a28;
      --text: #f1efe8;
      --text-secondary: #b4b2a9;
      --border: rgba(255,255,255,0.15);
      --info-bg: #042c53;
      --info-text: #b5d4f4;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); font-size: 13px; margin: 0 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg-secondary); border-radius: 10px; padding: 1rem; }
  .stat-label { font-size: 13px; color: var(--text-secondary); margin: 0 0 4px; }
  .stat-value { font-size: 24px; font-weight: 500; margin: 0; }
  .controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  select, input {
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
  }
  input[type="checkbox"] { width: auto; }
  .checkbox-label { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .sort-select { margin-left: auto; }
  #notes-panel {
    display: none;
    background: var(--info-bg);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    font-size: 13px;
    line-height: 1.6;
  }
  #notes-panel .header { display: flex; justify-content: space-between; align-items: start; gap: 8px; }
  #notes-panel .title { font-weight: 500; margin: 0 0 6px; color: var(--info-text); }
  #notes-panel .body { margin: 0; color: var(--text); }
  #notes-panel .severity-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 6px;
    margin: 0 0 8px;
    letter-spacing: 0.02em;
  }
  .sev-acute { background: #fbe1e1; color: #9b1c1c; }
  .sev-structural { background: #fbedd2; color: #8a5a09; }
  .sev-routine { background: #e9e8e3; color: #5f5e5a; }
  @media (prefers-color-scheme: dark) {
    .sev-acute { background: #4a1414; color: #f5b3b3; }
    .sev-structural { background: #4a3608; color: #f5d896; }
    .sev-routine { background: #38372f; color: #cfcdc3; }
  }
  .sev-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-left: 5px; }
  .dot-acute { background: #c1352f; }
  .dot-structural { background: #c98a1f; }
  .dot-routine { background: #9b9a92; }
  #notes-panel button {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--text-secondary); font-size: 16px; line-height: 1;
  }
  .table-wrap {
    max-height: 600px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: fixed; }
  thead { position: sticky; top: 0; background: var(--bg); z-index: 1; }
  th { text-align: left; padding: 8px 10px; font-weight: 500; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; }
  .col-name { width: 32%; }
  .col-cat { width: 17%; }
  .col-comm { width: 15%; }
  .col-region { width: 11%; color: var(--text-secondary); }
  .col-price { width: 18%; text-align: right; font-weight: 500; }
  .col-notes { width: 7%; text-align: center; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .flag-icon { color: #BA7517; margin-left: 4px; }
  .notes-btn { background: none; border: none; cursor: pointer; padding: 2px; color: var(--info-text); font-size: 14px; }
  .empty-cell { color: var(--text-secondary); opacity: 0.5; }
  footer { margin-top: 1.5rem; font-size: 12px; color: var(--text-secondary); text-align: center; }
  #acute-panel {
    background: var(--bg-secondary);
    border: 1px solid #e8c4c2;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  @media (prefers-color-scheme: dark) {
    #acute-panel { border-color: #5a2a2a; }
  }
  .acute-panel-header { display: flex; align-items: center; gap: 8px; }
  .acute-panel-header h2 { font-size: 15px; font-weight: 600; margin: 0; }
  .acute-panel-sub { font-size: 12px; color: var(--text-secondary); margin: 2px 0 12px 17px; }
  .acute-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .acute-item:last-child { border-bottom: none; }
  .acute-rank { color: var(--text-secondary); font-size: 12px; width: 20px; flex-shrink: 0; }
  .acute-name { flex: 1; }
  .acute-region { color: var(--text-secondary); font-size: 12px; margin-left: 8px; }
  .acute-price { font-weight: 500; margin-left: 12px; white-space: nowrap; }
  .acute-empty { font-size: 13px; color: var(--text-secondary); padding: 4px 0; }
</style>
</head>
<body>

<h1>Fragrance materials market dashboard</h1>
<p class="subtitle" id="last-updated">Loading...</p>

<div class="stats">
  <div class="stat-card">
    <p class="stat-label">Total materials</p>
    <p class="stat-value" id="stat-total">-</p>
  </div>
  <div class="stat-card">
    <p class="stat-label">Shown</p>
    <p class="stat-value" id="stat-shown">-</p>
  </div>
  <div class="stat-card">
    <p class="stat-label">With market notes</p>
    <p class="stat-value" id="stat-notes">-</p>
  </div>
  <div class="stat-card">
    <p class="stat-label">Grade-spread flags</p>
    <p class="stat-value" id="stat-flags">-</p>
  </div>
</div>

<div id="acute-panel">
  <div class="acute-panel-header">
    <span class="sev-dot dot-acute" style="margin-left:0;"></span>
    <h2 id="acute-panel-title">Top Acute Crisis materials</h2>
  </div>
  <p class="acute-panel-sub" id="acute-panel-sub"></p>
  <div id="acute-list"></div>
</div>

<div class="controls">
  <select id="f-category"><option value="">All categories</option></select>
  <select id="f-commodity"><option value="">All commodities</option></select>
  <select id="f-region"><option value="">All regions</option></select>
  <select id="f-severity">
    <option value="">All severities</option>
    <option value="Acute Crisis">Acute Crisis</option>
    <option value="Structural Risk">Structural Risk</option>
    <option value="Routine Logistics">Routine Logistics</option>
  </select>
  <label class="checkbox-label"><input type="checkbox" id="f-notes-only" />Notes only</label>
  <input id="f-search" type="text" placeholder="Search name..." style="width: 140px;" />
  <select id="f-sort" class="sort-select">
    <option value="high-desc">Highest cost first</option>
    <option value="high-asc">Lowest cost first</option>
    <option value="name-asc">Name A-Z</option>
  </select>
</div>

<div id="notes-panel">
  <div class="header">
    <p class="title" id="notes-panel-title"></p>
    <button id="notes-panel-close" aria-label="Close">&times;</button>
  </div>
  <p class="severity-badge" id="notes-panel-severity"></p>
  <p class="body" id="notes-panel-body"></p>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th class="col-name">Material</th>
      <th class="col-cat">Category</th>
      <th class="col-comm">Commodity</th>
      <th class="col-region">Region</th>
      <th class="col-price">$/kg range</th>
      <th class="col-notes">Notes</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
</div>

<footer>Data refreshes via scheduled scrapers. See repository Actions tab for last run status.</footer>

<script>
var catColors = {
  'Synthetic Aroma Chemical': { bg: '#e6f1fb', text: '#0c447c' },
  'Essential Oil': { bg: '#e1f5ee', text: '#085041' },
  'Absolute': { bg: '#eeedfe', text: '#3c3489' },
  'Natural Isolate': { bg: '#faece7', text: '#712b13' },
  'Resinoid': { bg: '#faeeda', text: '#633806' }
};

var DATA = [];

function uniqueSorted(arr) {
  return Array.from(new Set(arr.filter(Boolean))).sort();
}
function populateSelect(id, items) {
  var sel = document.getElementById(id);
  items.forEach(function(item) {
    var opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    sel.appendChild(opt);
  });
}
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
var severityClass = {
  'Acute Crisis': 'sev-acute',
  'Structural Risk': 'sev-structural',
  'Routine Logistics': 'sev-routine'
};
var severityDotClass = {
  'Acute Crisis': 'dot-acute',
  'Structural Risk': 'dot-structural',
  'Routine Logistics': 'dot-routine'
};
function showNotes(name, notes, severity) {
  document.getElementById('notes-panel-title').textContent = name;
  document.getElementById('notes-panel-body').textContent = notes;
  var sevEl = document.getElementById('notes-panel-severity');
  if (severity) {
    sevEl.textContent = severity;
    sevEl.className = 'severity-badge ' + (severityClass[severity] || '');
    sevEl.style.display = 'inline-block';
  } else {
    sevEl.style.display = 'none';
  }
  document.getElementById('notes-panel').style.display = 'block';
}

function render() {
  var cat = document.getElementById('f-category').value;
  var comm = document.getElementById('f-commodity').value;
  var reg = document.getElementById('f-region').value;
  var sev = document.getElementById('f-severity').value;
  var notesOnly = document.getElementById('f-notes-only').checked;
  var search = document.getElementById('f-search').value.toLowerCase();
  var sort = document.getElementById('f-sort').value;

  var filtered = DATA.filter(function(d) {
    if (cat && d.category !== cat) return false;
    if (comm && d.commodity !== comm) return false;
    if (reg && d.region !== reg) return false;
    if (sev && d.severity !== sev) return false;
    if (notesOnly && !d.notes) return false;
    if (search && d.name.toLowerCase().indexOf(search) === -1) return false;
    return true;
  });

  if (sort === 'high-desc') filtered.sort(function(a,b){ return (b.high||0) - (a.high||0); });
  else if (sort === 'high-asc') filtered.sort(function(a,b){ return (a.high||0) - (b.high||0); });
  else filtered.sort(function(a,b){ return a.name.localeCompare(b.name); });

  document.getElementById('stat-shown').textContent = filtered.length;

  var tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  filtered.forEach(function(d) {
    var colors = catColors[d.category] || { bg: '#f1efe8', text: '#5f5e5a' };
    var rangeText = (d.low != null && d.high != null)
      ? '$' + Math.round(d.low).toLocaleString() + ' - $' + Math.round(d.high).toLocaleString()
      : 'No data';
    var regionText = d.region || '\u2014';

    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="col-name">' + escapeHtml(d.name) + (d.flag ? '<span class="flag-icon" title="Wide price spread, check grade">\u26A0</span>' : '') + '</td>' +
      '<td class="col-cat"><span class="badge" style="background:' + colors.bg + ';color:' + colors.text + '">' + escapeHtml(d.category) + '</span></td>' +
      '<td class="col-comm">' + escapeHtml(d.commodity) + '</td>' +
      '<td class="col-region">' + escapeHtml(regionText) + '</td>' +
      '<td class="col-price">' + rangeText + '</td>' +
      '<td class="col-notes"></td>';

    var notesCell = tr.querySelector('.col-notes');
    if (d.notes) {
      var btn = document.createElement('button');
      btn.className = 'notes-btn';
      btn.setAttribute('aria-label', 'View market note for ' + d.name + (d.severity ? ' (' + d.severity + ')' : ''));
      btn.title = d.severity || '';
      btn.innerHTML = '\u24D8' + (d.severity ? '<span class="sev-dot ' + (severityDotClass[d.severity] || '') + '"></span>' : '');
      btn.addEventListener('click', function() { showNotes(d.name, d.notes, d.severity); });
      notesCell.appendChild(btn);
    } else {
      notesCell.innerHTML = '<span class="empty-cell">\u2014</span>';
    }
    tbody.appendChild(tr);
  });
}

function renderAcutePanel(DATA) {
  var acute = DATA.filter(function(d) { return d.severity === 'Acute Crisis'; });
  acute.sort(function(a, b) { return (b.high || 0) - (a.high || 0); });
  var top = acute.slice(0, 10);

  var titleEl = document.getElementById('acute-panel-title');
  var subEl = document.getElementById('acute-panel-sub');
  var listEl = document.getElementById('acute-list');

  titleEl.textContent = 'Top ' + top.length + ' Acute Crisis material' + (top.length === 1 ? '' : 's');
  subEl.textContent = top.length > 0
    ? 'Ranked by $/kg high-end price exposure. Click a material to read the full note.'
    : '';
  listEl.innerHTML = '';

  if (top.length === 0) {
    listEl.innerHTML = '<p class="acute-empty">No materials currently flagged as Acute Crisis.</p>';
    return;
  }

  top.forEach(function(d, i) {
    var rangeText = (d.low != null && d.high != null)
      ? '$' + Math.round(d.low).toLocaleString() + ' - $' + Math.round(d.high).toLocaleString()
      : 'No data';
    var row = document.createElement('div');
    row.className = 'acute-item';
    row.style.cursor = 'pointer';
    row.innerHTML =
      '<span class="acute-rank">' + (i + 1) + '.</span>' +
      '<span class="acute-name">' + escapeHtml(d.name) +
        (d.region ? '<span class="acute-region">' + escapeHtml(d.region) + '</span>' : '') +
      '</span>' +
      '<span class="acute-price">' + rangeText + '</span>';
    row.addEventListener('click', function() { showNotes(d.name, d.notes, d.severity); });
    listEl.appendChild(row);
  });
}

fetch('data.json')
  .then(function(res) { return res.json(); })
  .then(function(json) {
    DATA = json.materials;
    document.getElementById('last-updated').textContent = 'Last updated: ' + json.last_updated;
    document.getElementById('stat-total').textContent = DATA.length;
    document.getElementById('stat-notes').textContent = DATA.filter(function(d){ return d.notes; }).length;
    document.getElementById('stat-flags').textContent = DATA.filter(function(d){ return d.flag; }).length;

    var categories = uniqueSorted(DATA.map(function(d){ return d.category; }));
    var commodities = uniqueSorted(DATA.map(function(d){ return d.commodity; }));
    var regions = uniqueSorted(DATA.map(function(d){ return d.region; }));
    populateSelect('f-category', categories);
    populateSelect('f-commodity', commodities);
    populateSelect('f-region', regions);

    ['f-category','f-commodity','f-region','f-severity','f-search','f-sort','f-notes-only'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', render);
    });
    document.getElementById('notes-panel-close').addEventListener('click', function() {
      document.getElementById('notes-panel').style.display = 'none';
    });

    renderAcutePanel(DATA);
    render();
  })
  .catch(function(err) {
    document.getElementById('last-updated').textContent = 'Error loading data.json: ' + err;
  });
</script>

</body>
</html>
